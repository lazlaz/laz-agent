server:
  port: 8080

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:file:./data/shopai;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

shopai:
  llm:
    provider: deepseek
    api-key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat
    base-url: https://api.deepseek.com/v1
    timeout: 30s
  agent:
    max-iterations: 10
    max-history-messages: 20
  rag:
    embedding:
      model-path: D:/models/huggingface
      model-name: BAAI/bge-small-zh-v1.5
      sidecar-port: 9876
      sidecar-startup-timeout-seconds: 30
    chroma:
      host: localhost
      port: 8000
      collection: shopai_policies
    retrieval:
      top-k: 3
      min-score: 0.5
    policies-dir: policies/
  langfuse:
    host: https://jp.cloud.langfuse.com

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    dev.langchain4j: DEBUG
    com.shopai.agent.tracing: DEBUG
    io.opentelemetry: DEBUG
    io.opentelemetry.exporter: DEBUG