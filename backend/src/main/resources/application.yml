server:
  port: 8080

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:file:./data/shopai;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

shopai:
  llm:
    provider: deepseek
    api-key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat
    base-url: https://api.deepseek.com/v1
    timeout: 30s
  agent:
    max-iterations: 10
    max-history-messages: 20
    # Memory mode: "window" (sliding window) or "summarizing" (auto-summarize older messages)
    memory:
      mode: summarizing
      summarizing:
        max-messages-before-summary: 15
        keep-recent-count: 10
    # Plan-Execute engine configuration
    plan-execute:
      max-steps: 10
  rag:
    embedding:
      sidecar-host: 127.0.0.1
      sidecar-port: 9876
    chroma:
      host: localhost
      port: 8000
      collection: shopai_policies
    retrieval:
      top-k: 3
      min-score: 0.5
    policies-dir: policies/
    chunking:
      parent:
        max-segment-size: 1500
        max-overlap-size: 200
      child:
        max-segment-size: 500
        max-overlap-size: 50
    vision:
      enabled: false
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com/v1
      model: deepseek-v2.5-vision
      max-image-size-kb: 1024
      max-pages-to-analyze: 10
    supported-extensions: .md,.txt,.pdf,.docx,.doc,.pptx,.xlsx
    query-expansion:
      enabled: true
      num-variants: 3
    hybrid-search:
      enabled: true
      rrf-k: 60
  langfuse:
    host: https://jp.cloud.langfuse.com

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    # ── 关键日志（Tool 调用 / RAG 检索 / 索引操作） ──
    com.shopai.agent.tool: INFO
    com.shopai.agent.rag: INFO
    com.shopai.agent.web: INFO
    com.shopai.agent.config: INFO
    # ── 抑制噪音 ──
    dev.langchain4j: WARN
    com.shopai.agent.tracing: WARN
    io.opentelemetry: WARN
    io.opentelemetry.exporter: WARN
    org.springframework: WARN