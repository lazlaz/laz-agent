server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/shopai;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

shopai:
  llm:
    provider: deepseek
    api-key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat
    base-url: https://api.deepseek.com/v1
    timeout: 30s
  agent:
    max-iterations: 10
    max-history-messages: 20

logging:
  level:
    dev.langchain4j: DEBUG